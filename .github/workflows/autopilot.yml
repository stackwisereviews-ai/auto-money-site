name: AI Business Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  make-money:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to avoid conflicts
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests feedparser

      
      - name: Find Trends
        run: python trend_scout.py
      
      - name: Write Article
        run: python content_writer.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Commit and Push
        run: |
          git config --global user.name "AI Business Bot"
          git config --global user.email "bot@example.com"
          git add .
          git diff --staged --quiet || git commit -m "🤖 Daily automated content: $(date)"
          git pull --rebase origin main || true
          git push origin main
          git push
          
