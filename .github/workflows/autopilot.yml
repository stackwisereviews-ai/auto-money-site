name: AI Business Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  make-money:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install google-generativeai feedparser
      
      - name: Find Trends
        run: python trend_scout.py
      
      - name: Write Article
        run: python content_writer.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      - name: Commit and Push
        run: |
          git config --global user.name "AI Business Bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "🤖 Daily automated content: $(date)" || echo "No changes"
          git push
          
